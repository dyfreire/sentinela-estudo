e esperar que ele me pedisse ajuda?\n*   Quais são as barreiras que me impedem de ser mais consolador? Timidez, a sensação de não ter as palavras certas, ou a falta de atenção às necessidades dos outros?\n*   De que maneiras práticas posso \"fazer tudo que puder\" para consolar alguém em minha congregação *nesta semana*?\n*   Ao consolar, meu foco está em resolver o problema da pessoa ou em simplesmente \"estar ao lado dela\", oferecendo apoio e empatia como Jesus faria?", "resposta": "Em vista do aumento das dificuldades nestes últimos dias, devemos tomar a firme decisão de imitar a Jeová e a Cristo, buscando ativamente todas as oportunidades para oferecer consolo prático e espiritual uns aos outros."}}], "perguntas_revisao_final": {"1": {"pergunta": "Como a palavra 'consolo' é usada na Bíblia?", "resposta": "Na Bíblia, a palavra 'consolo' refere-se a receber alívio, encorajamento e força para suportar dificuldades. Ela abrange a ideia de ser confortado e fortalecido em momentos de aflição, com Deus sendo a fonte primária desse consolo.", "versiculos_referenciados": ["2 Coríntios 1:3", "Romanos 15:4", "Isaías 40:31"]}, "2": {"pergunta": "O que podemos fazer para consolar outros?", "resposta": "Para consolar outros, podemos ouvir com empatia, expressar nossa compaixão e oferecer ajuda prática, como orar com eles ou providenciar apoio. É importante também compartilhar esperança baseada nas promessas de Deus e lembrar que ele se importa com o sofrimento deles.", "versiculos_referenciados": ["Tiago 5:14", "Gálatas 6:2", "Romanos 12:8", "1 Tessalonicenses 5:11"]}, "3": {"pergunta": "O que podemos fazer quando nós precisamos de consolo?", "resposta": "Quando precisamos de consolo, devemos orar a Deus, lendo a Bíblia para encontrar palavras de conforto e esperança. Buscar o apoio de irmãos na fé e conversar com eles sobre nossos sentimentos também pode trazer alívio e encorajamento.", "versiculos_referenciados": ["Salmo 94:19", "Salmo 62:8", "Provérbios 14:10", "1 Coríntios 13:4"]}}, "recapitulacao": [{"pergunta": "Como a palavra “consolo” é usada na Bíblia?", "resposta": "Na Bíblia, a palavra “consolo” refere-se a receber alívio, encorajamento e força para suportar dificuldades. Ela abrange a ideia de ser confortado e fortalecido em momentos de aflição, com Deus sendo a fonte primária desse consolo."}, {"pergunta": "O que podemos fazer para consolar outros?", "resposta": "Para consolar outros, podemos ouvir com empatia, expressar nossa compaixão e oferecer ajuda prática, como orar com eles ou providenciar apoio. É importante também compartilhar esperança baseada nas promessas de Deus e lembrar que ele se importa com o sofrimento deles."}, {"pergunta": "O que podemos fazer quando nós precisamos de consolo?", "resposta": "Quando precisamos de consolo, devemos orar a Deus, lendo a Bíblia para encontrar palavras de conforto e esperança. Buscar o apoio de irmãos na fé e conversar com eles sobre nossos sentimentos também pode trazer alívio e encorajamento."}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);

/* --- mini markdown --- */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function inline(s){
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g,'$1<em>$2</em>');
}
function md(src){
  const lines = (src||'').split('\n'); let out=[]; let inList=false;
  const closeList=()=>{ if(inList){ out.push('</ul>'); inList=false; } };
  for(let raw of lines){
    const line = raw.replace(/\s+$/,'');
    if(!line.trim()){ closeList(); continue; }
    let m;
    if((m=line.match(/^###\s+(.*)/))){ closeList(); out.push('<h3>'+inline(m[1])+'</h3>'); continue; }
    if((m=line.match(/^##\s+(.*)/))){ closeList(); out.push('<h2>'+inline(m[1])+'</h2>'); continue; }
    if((m=line.match(/^\s*[*\-]\s+(.*)/))){ if(!inList){ out.push('<ul>'); inList=true; } out.push('<li>'+inline(m[1])+'</li>'); continue; }
    closeList(); out.push('<p>'+inline(line)+'</p>');
  }
  closeList(); return out.join('\n');
}

/* --- painéis flutuantes --- */
let zTop = 50, offset = 0;
function makePanel(title){
  const p = document.createElement('div'); p.className='panel';
  const baseX = Math.min(window.innerWidth - 400, 80 + offset);
  const baseY = 80 + offset; offset = (offset + 28) % 140;
  p.style.left = Math.max(10, baseX)+'px'; p.style.top = baseY+'px';
  p.innerHTML = '<div class="phead"><span class="ptitle"></span><button title="Fechar">×</button></div>';
  p.querySelector('.ptitle').textContent = title;
  p.querySelector('button').onclick = ()=> p.remove();
  p.addEventListener('mousedown', ()=>{ p.style.zIndex = ++zTop; });
  // drag
  const head = p.querySelector('.phead'); let dx=0, dy=0, drag=false;
  head.addEventListener('mousedown', e=>{ drag=true; dx=e.clientX-p.offsetLeft; dy=e.clientY-p.offsetTop; e.preventDefault(); });
  window.addEventListener('mousemove', e=>{ if(!drag) return; p.style.left=(e.clientX-dx)+'px'; p.style.top=(e.clientY-dy)+'px'; });
  window.addEventListener('mouseup', ()=> drag=false);
  // touch drag
  head.addEventListener('touchstart', e=>{ const t=e.touches[0]; drag=true; dx=t.clientX-p.offsetLeft; dy=t.clientY-p.offsetTop; }, {passive:true});
  window.addEventListener('touchmove', e=>{ if(!drag) return; const t=e.touches[0]; p.style.left=(t.clientX-dx)+'px'; p.style.top=(t.clientY-dy)+'px'; }, {passive:true});
  window.addEventListener('touchend', ()=> drag=false);
  p.style.zIndex = ++zTop;
  document.body.appendChild(p);
  return p;
}

function accSection(icon, title, open){
  const sec = document.createElement('div'); sec.className='acc'+(open?' open':'');
  const h = document.createElement('button'); h.className='acc-h';
  h.innerHTML = '<span class="ai">'+icon+'</span><span class="at">'+title+'</span><span class="ac">▾</span>';
  const b = document.createElement('div'); b.className='acc-b';
  h.onclick = ()=> sec.classList.toggle('open');
  sec.append(h, b);
  return {sec, body:b};
}

function openExplain(par){
  const p = makePanel('§'+par.numero+' — Estudo');
  const sub = document.createElement('div'); sub.className='psub'; sub.textContent = par.pergunta||'';
  const body = document.createElement('div'); body.className='pbody';
  p.appendChild(sub); p.appendChild(body);
  const s = par.secoes || {};

  const mk = (icon, title, mdtext, open)=>{
    if(!mdtext) return;
    const {sec, body:b} = accSection(icon, title, open);
    b.innerHTML = md(mdtext); body.appendChild(sec);
  };
  mk('💬', 'Resposta da pergunta', s.resposta, true);
  mk('🔍', 'Explicação do parágrafo', s.explicacao, false);

  // Explicação dos textos (versículos)
  const vcs = par.versiculos_citados || [];
  if(vcs.length){
    const {sec, body:b} = accSection('📖', 'Explicação dos textos', false);
    vcs.forEach(vc=>{
      const row=document.createElement('button'); row.className='verse-row';
      row.innerHTML='<b>'+esc(vc.card.referencia||vc.ref)+'</b><span>abrir ›</span>';
      row.onclick=()=> openVerse(vc.card);
      b.appendChild(row);
    });
    body.appendChild(sec);
  }

  // Imagem do parágrafo
  const imgs = par.imagens || [];
  if(imgs.length){
    const {sec, body:b} = accSection('🖼️', 'Imagem do parágrafo', false);
    imgs.forEach(im=>{
      const d=document.createElement('div'); d.className='img-block';
      let h='';
      if(im.url) h+='<img class="par-img" src="'+im.url+'" alt="'+esc(im.legenda)+'">';
      h+='<p class="img-cap">'+esc(im.legenda)+'</p><p>'+esc(im.explicacao)+'</p>';
      d.innerHTML=h; b.appendChild(d);
    });
    body.appendChild(sec);
  }

  mk('✨', 'Pontos adicionais', s.pontos, false);
  mk('🤝', 'No dia a dia (irmãos e pessoas)', s.diaadia, false);
}

function openVerse(card){
  const p = makePanel('📖 '+card.referencia);
  const body = document.createElement('div'); body.className='pbody';
  let h = '<div class="verseblock">'+esc(card.texto_versiculo)+'</div>';
  if(card.contexto_antes) h += '<div class="ctx"><b>Antes:</b> '+esc(card.contexto_antes)+'</div>';
  if(card.contexto_depois) h += '<div class="ctx"><b>Depois:</b> '+esc(card.contexto_depois)+'</div>';
  if(card.explicacao_simples) h += '<h3>O que significa</h3><p>'+esc(card.explicacao_simples)+'</p>';
  body.innerHTML = h; p.appendChild(body);
}

/* --- render --- */
const a = DATA.artigo;
document.getElementById('hdata').textContent = a.data || '';
document.getElementById('hsub').textContent = a.subtitulo || '';
document.getElementById('htitulo').textContent = a.titulo || '';
document.getElementById('htema').innerHTML = (a.versiculo_tema? '“'+esc(a.versiculo_tema)+'”' : '')
  + (a.referencia_tema? '<span class="ref">'+esc(a.referencia_tema)+'</span>' : '');
const meta = document.getElementById('hmeta');
for(const [k,v] of [['🎯 '+(a.objetivo||''), a.objetivo],['🎵 '+(a.cantico_inicial||''), a.cantico_inicial],['🎵 '+(a.cantico_final||''), a.cantico_final]]){
  if(v){ const s=document.createElement('span'); s.textContent=k; meta.appendChild(s); }
}

const root = document.getElementById('pars');
for(const par of DATA.paragrafos){
  const el = document.createElement('article'); el.className='par';
  el.innerHTML = '<div class="num">'+esc(par.numero)+'</div>'
    + '<p class="perg">'+esc(par.pergunta||'')+'</p>'
    + '<p class="txt">'+esc(par.texto_artigo||'')+'</p>'
    + '<div class="footer"></div>';
  const footer = el.querySelector('.footer');
  for(const vc of (par.versiculos_citados||[])){
    const chip=document.createElement('span'); chip.className='chip'; chip.textContent='📖 '+(vc.card.referencia||vc.ref);
    chip.onclick=(e)=>{ e.stopPropagation(); openVerse(vc.card); };
    footer.appendChild(chip);
  }
  if((par.imagens||[]).length){
    const ic=document.createElement('span'); ic.className='chip'; ic.textContent='🖼️ Imagem';
    ic.onclick=(e)=>{ e.stopPropagation(); openExplain(par); };
    footer.appendChild(ic);
  }
  const btn=document.createElement('button'); btn.className='explain-btn'; btn.textContent='💡 Explicação';
  btn.onclick=(e)=>{ e.stopPropagation(); openExplain(par); };
  footer.appendChild(btn);
  el.addEventListener('click', ()=> openExplain(par));
  root.appendChild(el);
}

/* recapitulação (accordion: toque revela a resposta) */
const recap = DATA.recapitulacao || [];
if(recap.length){
  const sec = document.getElementById('recap');
  sec.innerHTML = '<h2>📝 Recapitulação</h2><div class="recap-sub">Toque na pergunta para ver a resposta</div>';
  recap.forEach((r, i)=>{
    const it = document.createElement('div'); it.className='recap-item';
    it.innerHTML = '<div class="rq"><span class="n">'+(i+1)+'️⃣</span><span class="qt">'+esc(r.pergunta)+'</span><span class="tg">ver resposta ▾</span></div>'
      + '<div class="ra"><p>'+esc(r.resposta)+'</p></div>';
    const tg = it.querySelector('.tg');
    it.onclick = ()=>{ const open = it.classList.toggle('open'); tg.textContent = open ? 'ocultar ▴' : 'ver resposta ▾'; };
    sec.appendChild(it);
  });
}
</script>
</body>
</html>
